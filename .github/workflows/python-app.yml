name: Python application

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run crypto bot
        run: python main.py

      - name: Run Robur bot
        run: python robur.py

      - name: Run Trading212 bot
        run: python stocks.py

      - name: Test Binance API
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python binance_test.py

      - name: Save portfolio state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add portfolio_state.json
          git commit -m "Update portfolio state" || echo "No changes to commit"
          git push
